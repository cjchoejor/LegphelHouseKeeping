<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#4a90e2" />
  <title>Legphel Housekeeping</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue: #4a90e2;
      --blue-dark: #357abd;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #f3f4f6;
      --warn-bg: #fff8e1;
      --warn-border: #f5c518;
      --header-h: 150px; /* measured live in JS */
    }

    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding-bottom: 40px;
      font-size: 16px;
      line-height: 1.45;
    }

    /* ---- Top bar (sticky) ---- */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--blue);
      color: #fff;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      height: 40px;
      width: auto;
      flex: 0 0 auto;
    }

    .brand-text { min-width: 0; }

    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    header .sub {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 2px;
    }

    /* ---- Controls ---- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
      margin-top: 12px;
    }

    .field { display: flex; flex-direction: column; flex: 1 1 120px; }

    .field label {
      font-size: 11px;
      opacity: 0.9;
      margin-bottom: 3px;
    }

    input[type="date"] {
      padding: 9px 10px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      width: 100%;
    }

    .btnrow {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btnrow button {
      flex: 1 1 0;
      min-width: 0;
      padding: 11px 8px;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: var(--blue-dark);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .btnrow button:active { transform: scale(0.99); }

    /* ---- Body ---- */
    main { padding: 12px 12px 0; max-width: 640px; margin: 0 auto; }

    .status {
      text-align: center;
      color: var(--muted);
      padding: 30px 10px;
      font-size: 15px;
    }
    .status.error { color: #c0392b; }

    /* ---- Date section header (sticky under top bar) ---- */
    .day-header {
      position: sticky;
      top: var(--header-h);
      z-index: 10;
      background: var(--ink);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      margin: 16px 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .day-stats { display: flex; gap: 6px; }
    .stat {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      color: #fff;
    }
    .stat-rooms { background: #3b82f6; }   /* blue  = rooms */
    .stat-occ   { background: #16a34a; }   /* green = occupants */

    /* ---- Reservation card ---- */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      border-left: 5px solid var(--blue);
    }
    .card.blocked {
      border-left-color: var(--warn-border);
      background: var(--warn-bg);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }
    .room-no {
      font-size: 20px;
      font-weight: 700;
      color: var(--blue-dark);
    }
    .card.blocked .room-no { color: #a17f00; }

    .beds { font-size: 13px; color: var(--ink); text-align: right; white-space: nowrap; }
    .beds .bed-badge {
      background: #fdeaea;
      color: #c0392b;
      padding: 3px 8px;
      border-radius: 8px;
      font-weight: 600;
    }

    .cust { font-size: 16px; font-weight: 600; margin-bottom: 8px; }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      font-size: 13px;
    }
    .meta .k { color: var(--muted); }
    .meta .v { font-weight: 600; }

    .pref {
      margin-top: 10px;
      background: #fdeaea;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }
    .card.blocked .pref { background: rgba(255,255,255,0.6); }
    .pref .lbl {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .blocked-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      background: var(--warn-border);
      color: #4a3a00;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .refnote { font-size: 11px; color: var(--muted); margin-top: 8px; }

    /* ---- Table view ---- */
    /* The table area is its OWN scroll box (both directions) so the header row
       and the Room column can pin to the box edges reliably on mobile. */
    .table-scroll {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      height: calc(100dvh - var(--header-h) - 24px);
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      background: #fff;
    }
    table.grid {
      border-collapse: separate;
      border-spacing: 0;
      width: 100%;
      font-size: 12.5px;
    }
    table.grid th, table.grid td {
      padding: 8px 10px;
      text-align: center;
      white-space: nowrap;
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }
    /* sticky column-title row, pinned to the top of the scroll box */
    table.grid thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--ink);
      color: #fff;
      font-weight: 600;
    }
    /* frozen first column (Room) */
    table.grid th.sticky-col, table.grid td.sticky-col {
      position: sticky;
      left: 0;
      z-index: 2;
      background: #eef2ff;
      font-weight: 700;
      color: var(--blue-dark);
      border-right: 2px solid var(--blue);
      /* keep the frozen column narrow: rooms stack vertically instead of widening */
      white-space: normal;
      width: 52px;
      min-width: 52px;
      max-width: 52px;
      padding: 6px 4px;
      line-height: 1.3;
    }
    /* top-left cell sits above both */
    table.grid thead th.sticky-col { z-index: 4; background: var(--ink); color: #fff; }

    /* full-width date separator row inside the table */
    table.grid tr.date-row td {
      background: #2c3e50;
      color: #fff;
      text-align: left;
      font-weight: 600;
      padding: 0;
      position: sticky;
      top: var(--grid-head-h, 34px);   /* parks just under the column-title row */
      z-index: 4;
    }
    /* contents pinned to the left so they stay visible when scrolling sideways */
    table.grid tr.date-row .date-inner {
      position: sticky;
      left: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      white-space: nowrap;
    }

    table.grid td.cell-pref {
      background: #fdeaea;
      white-space: normal;
      min-width: 160px;
      text-align: left;
      color: #8a1f1f;
    }

    /* zebra striping (alternate rows light grey) */
    table.grid tr.alt td { background: #f1f3f6; }
    table.grid tr.alt td.sticky-col { background: #e3e8f5; }
    table.grid tr.alt td.cell-pref { background: #fbe1e1; }

    table.grid tr.blocked-row td { background: var(--warn-bg); }
    table.grid tr.blocked-row td.sticky-col { background: #fff4cc; color: #a17f00; }
    table.grid td.cell-name { text-align: left; white-space: normal; min-width: 130px; }

    /* off-screen full render used only for the Save-as-image snapshot */
    .capture {
      position: fixed;
      left: -10000px;
      top: 0;
      background: #fff;
      padding: 16px;
      width: max-content;
    }
    .capture .cap-title { font-size: 16px; font-weight: 700; color: var(--ink); margin: 0 0 12px; }
    .capture table.grid { box-shadow: none; }
    /* sticky breaks image capture — pin everything static for the snapshot */
    .capture table.grid th,
    .capture table.grid td,
    .capture table.grid .date-inner { position: static !important; }

    /* ---- Image preview / save popup ---- */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }
    .modal-box {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      width: 100%;
      max-width: 520px;
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-hint { margin: 0; font-size: 13px; color: var(--muted); text-align: center; }
    .modal-img {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--line);
      border-radius: 8px;
      flex: 1 1 auto;
      min-height: 0;
    }
    .modal-img img { display: block; width: 100%; height: auto; }
    .modal-actions { display: flex; gap: 8px; }
    .modal-actions button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-actions button.ghost { background: #e5e7eb; color: var(--ink); }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <img src="legphel-logo.png" alt="Legphel logo" class="logo">
      <div class="brand-text">
        <h1>Legphel Housekeeping</h1>
        <div class="sub" id="rangeLabel">&nbsp;</div>
      </div>
    </div>
    <div class="controls">
      <div class="field">
        <label for="startDate">From</label>
        <input type="date" id="startDate">
      </div>
      <div class="field">
        <label for="endDate">To</label>
        <input type="date" id="endDate">
      </div>
    </div>
    <div class="btnrow">
      <button id="fetchBtn">Refresh</button>
      <button id="viewToggleBtn">▦ Table view</button>
      <button id="saveImgBtn" style="display:none">💾 Save</button>
    </div>
  </header>

  <main>
    <div id="content" class="status">Loading…</div>
  </main>

  <div id="imgModal" class="modal" style="display:none">
    <div class="modal-box">
      <p class="modal-hint">Press &amp; hold the image to save it to Photos — or tap Share / Save.</p>
      <div class="modal-img"><img id="modalImg" alt="Table snapshot"></div>
      <div class="modal-actions">
        <button id="shareImgBtn">Share / Save</button>
        <button id="closeModalBtn" class="ghost">Close</button>
      </div>
    </div>
  </div>

  <script>
    // On Netlify (https) we go through the serverless proxy so the browser never
    // has to call the http:// API directly (which https pages block).
    // Opened as a local file, we call the API directly so you can test quickly.
    const onHttps = location.protocol === 'https:';
    const apiBase = onHttps
      ? '/.netlify/functions/reservations'
      : 'http://119.2.105.142:3800/api/reservations_summary_for_mam';

    let lastData = null;        // cache so toggling views doesn't re-fetch
    let view = 'cards';         // 'cards' | 'table'

    // ---- date helpers (Asia/Thimphu, UTC+6) ----
    function thimphuToday() {
      const now = new Date();
      const t = new Date(now.getTime() + (6 * 60 + now.getTimezoneOffset()) * 60000);
      return t;
    }
    function fmt(d) { return d.toISOString().split('T')[0]; }
    function nextDay(d) { const n = new Date(d); n.setDate(n.getDate() + 1); return n; }

    function escapeHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/[&<>"']/g, m =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    // Stack a "601, 602, 701" room list vertically so the frozen column
    // stays narrow (grows taller, never wider) on a phone.
    function stackRooms(roomNo) {
      return String(roomNo ?? '')
        .split(',')
        .map(r => escapeHtml(r.trim()))
        .filter(Boolean)
        .join('<br>') || '—';
    }

    function bedText(king, twin) {
      const k = Number(king) || 0, t = Number(twin) || 0;
      const parts = [];
      if (k > 0) parts.push(`${k} King`);
      if (t > 0) parts.push(`${t} Twin`);
      return parts.length ? `<span class="bed-badge">🛏 ${parts.join(' · ')}</span>` : '';
    }

    function prettyDate(value) {
      if (!value) return '';
      let d;
      // API returns DD-MM-YYYY; the date inputs give YYYY-MM-DD.
      if (/^\d{2}-\d{2}-\d{4}$/.test(value)) {
        const [dd, mm, yy] = value.split('-');
        d = new Date(`${yy}-${mm}-${dd}`);
      } else {
        d = new Date(value);
      }
      if (isNaN(d)) return value;
      return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function render(data) {
      const el = document.getElementById('content');
      if (!data || data.length === 0) {
        el.className = 'status';
        el.textContent = 'No reservations for the selected dates.';
        return;
      }

      let html = '';
      data.forEach(day => {
        const groups = day.groups || [];
        html += dayHeaderHtml(day);

        if (groups.length === 0) {
          html += `<div class="status" style="padding:14px">No rooms booked.</div>`;
          return;
        }

        groups.forEach(g => {
          const blocked = g.reservation_status === 'blocked';
          const beds = bedText(g.king_bed, g.twin_bed);
          const pref = (g.special_preferences || '').trim();

          html += `<div class="card${blocked ? ' blocked' : ''}">
            <div class="card-top">
              <span class="room-no">Room ${escapeHtml(g.room_no)}${blocked ? '<span class="blocked-tag">BLOCKED</span>' : ''}</span>
              <span class="beds">${beds}</span>
            </div>
            <div class="cust">${escapeHtml(g.primary_customer_name ?? '—')}</div>
            <div class="meta">
              <span class="k">Adults</span><span class="v">${g.adults ?? 0}</span>
              <span class="k">Children</span><span class="v">${g.children ?? 0}</span>
              <span class="k">Children 6+</span><span class="v">${g.children_above_six ?? 0}</span>
              <span class="k">Occupants in Rooms</span><span class="v">${g.total_occupants_for_the_room ?? 0}</span>
              <span class="k">Rooms reserved</span><span class="v">${g.rooms_reserved ?? 0}</span>
              <span class="k">Reserved by</span><span class="v">${escapeHtml(g.reserved_by ?? '—')}</span>
            </div>
            ${pref ? `<div class="pref"><span class="lbl">Special preferences</span>${escapeHtml(pref)}</div>` : ''}
            <div class="refnote">Ref: ${escapeHtml(g.reservation_ref_no ?? '—')}</div>
          </div>`;
        });
      });

      el.className = '';
      el.innerHTML = html;
    }

    // shared date bar (used by both views)
    function dayHeaderHtml(day) {
      const groups = day.groups || [];
      const dt = day.day_totals || {};
      const totalRooms = dt.total_rooms_in_a_day ?? groups.length;
      const totalOcc = dt.total_occupants_for_the_day ?? 0;
      return `<div class="day-header">
        <span>${escapeHtml(prettyDate(day.reserved_date))}</span>
        <span class="day-stats">
          <span class="stat stat-rooms">${totalRooms} rooms</span>
          <span class="stat stat-occ">${totalOcc} guests</span>
        </span>
      </div>`;
    }

    const TABLE_COLS = ['Room', 'Customer', 'Beds', 'Adults', 'Children',
      'Child 6+', 'Occ. in Rooms', 'Rooms Res.', 'Reserved By', 'Ref No', 'Special Preferences'];

    // builds just the <table>…</table> markup, shared by the on-screen view and the image snapshot
    function tableMarkup(data) {
      const cols = TABLE_COLS;
      const colSpan = cols.length;

      let html = '<table class="grid"><thead><tr>';
      cols.forEach((c, i) => {
        html += `<th class="${i === 0 ? 'sticky-col' : ''}">${c}</th>`;
      });
      html += '</tr></thead><tbody>';

      let rowIdx = 0; // for zebra striping across data rows
      data.forEach(day => {
        const groups = day.groups || [];
        const dt = day.day_totals || {};
        const totalRooms = dt.total_rooms_in_a_day ?? groups.length;
        const totalOcc = dt.total_occupants_for_the_day ?? 0;

        // full-width date separator row
        html += `<tr class="date-row"><td colspan="${colSpan}"><div class="date-inner">
          <span>${escapeHtml(prettyDate(day.reserved_date))}</span>
          <span class="stat stat-rooms">${totalRooms} rooms</span>
          <span class="stat stat-occ">${totalOcc} guests</span>
        </div></td></tr>`;

        if (groups.length === 0) {
          html += `<tr><td colspan="${colSpan}" style="color:var(--muted)">No rooms booked.</td></tr>`;
          return;
        }

        groups.forEach(g => {
          const blocked = g.reservation_status === 'blocked';
          const beds = bedText(g.king_bed, g.twin_bed) || '—';
          const pref = (g.special_preferences || '').trim();
          const alt = (rowIdx++ % 2 === 0) ? ' alt' : '';
          html += `<tr class="${blocked ? 'blocked-row' : ''}${alt}">
            <td class="sticky-col">${stackRooms(g.room_no)}${blocked ? '<br>🔒' : ''}</td>
            <td class="cell-name">${escapeHtml(g.primary_customer_name ?? '—')}</td>
            <td>${beds}</td>
            <td>${g.adults ?? 0}</td>
            <td>${g.children ?? 0}</td>
            <td>${g.children_above_six ?? 0}</td>
            <td>${g.total_occupants_for_the_room ?? 0}</td>
            <td>${g.rooms_reserved ?? 0}</td>
            <td>${escapeHtml(g.reserved_by ?? '—')}</td>
            <td>${escapeHtml(g.reservation_ref_no ?? '—')}</td>
            <td class="${pref ? 'cell-pref' : ''}">${pref ? escapeHtml(pref) : '—'}</td>
          </tr>`;
        });
      });

      html += '</tbody></table>';
      return html;
    }

    function renderTable(data) {
      const el = document.getElementById('content');
      if (!data || data.length === 0) {
        el.className = 'status';
        el.textContent = 'No reservations for the selected dates.';
        return;
      }

      el.className = '';
      el.innerHTML = '<div class="table-scroll">' + tableMarkup(data) + '</div>';

      // park the sticky date bar exactly under the column-title row
      const thead = el.querySelector('table.grid thead');
      if (thead) document.documentElement.style.setProperty('--grid-head-h', thead.offsetHeight + 'px');
    }

    let lastImageFile = null; // the generated PNG, shared/saved from the popup

    // Capture the whole table (incl. off-screen parts) and show it in the save popup.
    async function saveTableImage() {
      if (!lastData || !lastData.length) { alert('Nothing to save yet — fetch some dates first.'); return; }
      if (typeof html2canvas === 'undefined') { alert('Image library not loaded. Check your connection and try again.'); return; }

      const btn = document.getElementById('saveImgBtn');
      const label = btn.textContent;
      btn.textContent = 'Saving…';
      btn.disabled = true;

      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;

      // render the full table off-screen (no scroll box, no sticky)
      const wrap = document.createElement('div');
      wrap.className = 'capture';
      wrap.innerHTML =
        `<div class="cap-title">Legphel Housekeeping &nbsp;·&nbsp; ${escapeHtml(prettyDate(start))} – ${escapeHtml(prettyDate(end))}</div>`
        + tableMarkup(lastData);
      document.body.appendChild(wrap);

      try {
        const canvas = await html2canvas(wrap, { scale: 2, backgroundColor: '#ffffff' });
        const fileName = `housekeeping_${start}_to_${end}.png`;

        // show the image in the popup so the user can long-press to save (iOS-safe)
        document.getElementById('modalImg').src = canvas.toDataURL('image/png');

        // prepare a File for the Share/Save button (fired by a fresh tap inside the popup)
        await new Promise(resolve => canvas.toBlob(blob => {
          lastImageFile = blob ? new File([blob], fileName, { type: 'image/png' }) : null;
          resolve();
        }, 'image/png'));

        document.getElementById('imgModal').style.display = 'flex';
      } catch (err) {
        alert('Could not create image: ' + err.message);
      } finally {
        document.body.removeChild(wrap);
        btn.textContent = label;
        btn.disabled = false;
      }
    }

    // Share/save the generated image — runs on a direct tap so iOS allows it.
    async function shareImage() {
      if (!lastImageFile) return;
      if (navigator.canShare && navigator.canShare({ files: [lastImageFile] })) {
        try {
          await navigator.share({ files: [lastImageFile], title: 'Housekeeping' });
        } catch (e) { /* user dismissed the share sheet */ }
      } else {
        const url = URL.createObjectURL(lastImageFile);
        const link = document.createElement('a');
        link.download = lastImageFile.name;
        link.href = url;
        link.click();
        URL.revokeObjectURL(url);
      }
    }

    // pick the active view
    function draw() {
      if (!lastData) return;
      if (view === 'table') renderTable(lastData);
      else render(lastData);
    }

    async function fetchAndRender() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      if (!start || !end) return;

      document.getElementById('rangeLabel').textContent =
        `${prettyDate(start)} – ${prettyDate(end)}`;

      const el = document.getElementById('content');
      el.className = 'status';
      el.textContent = 'Loading…';

      try {
        const resp = await fetch(`${apiBase}?start_date=${start}&end_date=${end}`);
        if (!resp.ok) throw new Error('Could not load data (' + resp.status + ')');
        lastData = await resp.json();
        draw();
      } catch (err) {
        el.className = 'status error';
        el.textContent = 'Error: ' + err.message;
      }
    }

    // Keep the sticky date headers parked exactly under the top bar,
    // even when the controls wrap to more rows on narrow screens.
    function syncHeaderHeight() {
      const h = document.querySelector('header').offsetHeight;
      document.documentElement.style.setProperty('--header-h', h + 'px');
    }

    function init() {
      const today = thimphuToday();
      const tomorrow = nextDay(today);
      const startEl = document.getElementById('startDate');
      const endEl = document.getElementById('endDate');
      startEl.value = fmt(today);
      endEl.value = fmt(tomorrow);

      // keep end = start + 1 day when start changes (matches old behaviour)
      startEl.addEventListener('change', function () {
        if (this.value) endEl.value = fmt(nextDay(new Date(this.value)));
      });

      document.getElementById('fetchBtn').addEventListener('click', fetchAndRender);

      document.getElementById('viewToggleBtn').addEventListener('click', function () {
        view = view === 'cards' ? 'table' : 'cards';
        this.textContent = view === 'cards' ? '▦ Table view' : '▤ Card view';
        document.getElementById('saveImgBtn').style.display = view === 'table' ? '' : 'none';
        draw();
        syncHeaderHeight();
        window.scrollTo(0, 0);
      });

      document.getElementById('saveImgBtn').addEventListener('click', saveTableImage);
      document.getElementById('shareImgBtn').addEventListener('click', shareImage);
      document.getElementById('closeModalBtn').addEventListener('click', function () {
        document.getElementById('imgModal').style.display = 'none';
      });

      syncHeaderHeight();
      window.addEventListener('resize', syncHeaderHeight);

      fetchAndRender();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
