<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#4a90e2" />
  <title>Legphel Housekeeping</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue: #4a90e2;
      --blue-dark: #357abd;
      --ink: #1f2933;
      --muted: #6b7280;
      --line: #e5e7eb;
      --bg: #f3f4f6;
      --warn-bg: #fff8e1;
      --warn-border: #f5c518;
      --header-h: 150px; /* measured live in JS */
    }

    html, body { margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding-bottom: 40px;
      font-size: 16px;
      line-height: 1.45;
    }

    /* ---- Top bar (sticky) ---- */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--blue);
      color: #fff;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      height: 40px;
      width: auto;
      flex: 0 0 auto;
    }

    .brand-text { min-width: 0; }

    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    header .sub {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 2px;
    }

    /* ---- Controls ---- */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-end;
      margin-top: 12px;
    }

    .field { display: flex; flex-direction: column; flex: 1 1 120px; }

    .field label {
      font-size: 11px;
      opacity: 0.9;
      margin-bottom: 3px;
    }

    input[type="date"] {
      padding: 9px 10px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      width: 100%;
    }

    .controls button {
      flex: 1 1 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: var(--blue-dark);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .controls button:active { transform: scale(0.99); }

    /* ---- Body ---- */
    main { padding: 12px 12px 0; max-width: 640px; margin: 0 auto; }

    .status {
      text-align: center;
      color: var(--muted);
      padding: 30px 10px;
      font-size: 15px;
    }
    .status.error { color: #c0392b; }

    /* ---- Date section header (sticky under top bar) ---- */
    .day-header {
      position: sticky;
      top: var(--header-h);
      z-index: 10;
      background: var(--ink);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      margin: 16px 0 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .day-stats { display: flex; gap: 6px; }
    .stat {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      color: #fff;
    }
    .stat-rooms { background: #3b82f6; }   /* blue  = rooms */
    .stat-occ   { background: #16a34a; }   /* green = occupants */

    /* ---- Reservation card ---- */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      border-left: 5px solid var(--blue);
    }
    .card.blocked {
      border-left-color: var(--warn-border);
      background: var(--warn-bg);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }
    .room-no {
      font-size: 20px;
      font-weight: 700;
      color: var(--blue-dark);
    }
    .card.blocked .room-no { color: #a17f00; }

    .beds { font-size: 13px; color: var(--ink); text-align: right; white-space: nowrap; }
    .beds .bed-badge {
      background: #fdeaea;
      color: #c0392b;
      padding: 3px 8px;
      border-radius: 8px;
      font-weight: 600;
    }

    .cust { font-size: 16px; font-weight: 600; margin-bottom: 8px; }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      font-size: 13px;
    }
    .meta .k { color: var(--muted); }
    .meta .v { font-weight: 600; }

    .pref {
      margin-top: 10px;
      background: #fdeaea;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }
    .card.blocked .pref { background: rgba(255,255,255,0.6); }
    .pref .lbl {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .blocked-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      background: var(--warn-border);
      color: #4a3a00;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .refnote { font-size: 11px; color: var(--muted); margin-top: 8px; }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <img src="legphel-logo.png" alt="Legphel logo" class="logo">
      <div class="brand-text">
        <h1>Legphel Housekeeping</h1>
        <div class="sub" id="rangeLabel">&nbsp;</div>
      </div>
    </div>
    <div class="controls">
      <div class="field">
        <label for="startDate">From</label>
        <input type="date" id="startDate">
      </div>
      <div class="field">
        <label for="endDate">To</label>
        <input type="date" id="endDate">
      </div>
      <button id="fetchBtn">Refresh</button>
    </div>
  </header>

  <main>
    <div id="content" class="status">Loading…</div>
  </main>

  <script>
    // On Netlify (https) we go through the serverless proxy so the browser never
    // has to call the http:// API directly (which https pages block).
    // Opened as a local file, we call the API directly so you can test quickly.
    const onHttps = location.protocol === 'https:';
    const apiBase = onHttps
      ? '/.netlify/functions/reservations'
      : 'http://119.2.105.142:3800/api/reservations_summary_for_mam';

    // ---- date helpers (Asia/Thimphu, UTC+6) ----
    function thimphuToday() {
      const now = new Date();
      const t = new Date(now.getTime() + (6 * 60 + now.getTimezoneOffset()) * 60000);
      return t;
    }
    function fmt(d) { return d.toISOString().split('T')[0]; }
    function nextDay(d) { const n = new Date(d); n.setDate(n.getDate() + 1); return n; }

    function escapeHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/[&<>"']/g, m =>
        ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m]));
    }

    function bedText(king, twin) {
      const k = Number(king) || 0, t = Number(twin) || 0;
      const parts = [];
      if (k > 0) parts.push(`${k} King`);
      if (t > 0) parts.push(`${t} Twin`);
      return parts.length ? `<span class="bed-badge">🛏 ${parts.join(' · ')}</span>` : '';
    }

    function prettyDate(value) {
      if (!value) return '';
      let d;
      // API returns DD-MM-YYYY; the date inputs give YYYY-MM-DD.
      if (/^\d{2}-\d{2}-\d{4}$/.test(value)) {
        const [dd, mm, yy] = value.split('-');
        d = new Date(`${yy}-${mm}-${dd}`);
      } else {
        d = new Date(value);
      }
      if (isNaN(d)) return value;
      return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function render(data) {
      const el = document.getElementById('content');
      if (!data || data.length === 0) {
        el.className = 'status';
        el.textContent = 'No reservations for the selected dates.';
        return;
      }

      let html = '';
      data.forEach(day => {
        const groups = day.groups || [];
        const dt = day.day_totals || {};
        const totalRooms = dt.total_rooms_in_a_day ?? groups.length;
        const totalOcc = dt.total_occupants_for_the_day ?? 0;
        html += `<div class="day-header">
          <span>${escapeHtml(prettyDate(day.reserved_date))}</span>
          <span class="day-stats">
            <span class="stat stat-rooms">${totalRooms} rooms</span>
            <span class="stat stat-occ">${totalOcc} guests</span>
          </span>
        </div>`;

        if (groups.length === 0) {
          html += `<div class="status" style="padding:14px">No rooms booked.</div>`;
          return;
        }

        groups.forEach(g => {
          const blocked = g.reservation_status === 'blocked';
          const beds = bedText(g.king_bed, g.twin_bed);
          const pref = (g.special_preferences || '').trim();

          html += `<div class="card${blocked ? ' blocked' : ''}">
            <div class="card-top">
              <span class="room-no">Room ${escapeHtml(g.room_no)}${blocked ? '<span class="blocked-tag">BLOCKED</span>' : ''}</span>
              <span class="beds">${beds}</span>
            </div>
            <div class="cust">${escapeHtml(g.primary_customer_name ?? '—')}</div>
            <div class="meta">
              <span class="k">Adults</span><span class="v">${g.adults ?? 0}</span>
              <span class="k">Children</span><span class="v">${g.children ?? 0}</span>
              <span class="k">Children 6+</span><span class="v">${g.children_above_six ?? 0}</span>
              <span class="k">Occupants in Rooms</span><span class="v">${g.total_occupants_for_the_room ?? 0}</span>
              <span class="k">Rooms reserved</span><span class="v">${g.rooms_reserved ?? 0}</span>
              <span class="k">Reserved by</span><span class="v">${escapeHtml(g.reserved_by ?? '—')}</span>
            </div>
            ${pref ? `<div class="pref"><span class="lbl">Special preferences</span>${escapeHtml(pref)}</div>` : ''}
            <div class="refnote">Ref: ${escapeHtml(g.reservation_ref_no ?? '—')}</div>
          </div>`;
        });
      });

      el.className = '';
      el.innerHTML = html;
    }

    async function fetchAndRender() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      if (!start || !end) return;

      document.getElementById('rangeLabel').textContent =
        `${prettyDate(start)} – ${prettyDate(end)}`;

      const el = document.getElementById('content');
      el.className = 'status';
      el.textContent = 'Loading…';

      try {
        const resp = await fetch(`${apiBase}?start_date=${start}&end_date=${end}`);
        if (!resp.ok) throw new Error('Could not load data (' + resp.status + ')');
        const data = await resp.json();
        render(data);
      } catch (err) {
        el.className = 'status error';
        el.textContent = 'Error: ' + err.message;
      }
    }

    // Keep the sticky date headers parked exactly under the top bar,
    // even when the controls wrap to more rows on narrow screens.
    function syncHeaderHeight() {
      const h = document.querySelector('header').offsetHeight;
      document.documentElement.style.setProperty('--header-h', h + 'px');
    }

    function init() {
      const today = thimphuToday();
      const tomorrow = nextDay(today);
      const startEl = document.getElementById('startDate');
      const endEl = document.getElementById('endDate');
      startEl.value = fmt(today);
      endEl.value = fmt(tomorrow);

      // keep end = start + 1 day when start changes (matches old behaviour)
      startEl.addEventListener('change', function () {
        if (this.value) endEl.value = fmt(nextDay(new Date(this.value)));
      });

      document.getElementById('fetchBtn').addEventListener('click', fetchAndRender);

      syncHeaderHeight();
      window.addEventListener('resize', syncHeaderHeight);

      fetchAndRender();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
